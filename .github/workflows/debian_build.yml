name: debian_build.yml
on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  package:
    name: Build Debian Package
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt update && sudo apt install -y build-essential libgl1-mesa-dev cmake clazy g++ ninja-build pkg-config libopencv-dev libgsl-dev libcfitsio-dev libomp-dev libmd4c-dev liblcms2-dev libcurl4-gnutls-dev liblz4-dev libzstd-dev libraw-dev

      - name: Compile Qt6
        run: |
          sudo apt install build-essential cmake ninja-build python3 git
          sudo apt install libfontconfig1-dev libfreetype-dev libgtk-3-dev libx11-dev libx11-xcb-dev libxcb-cursor-dev libxcb-glx0-dev libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev libxcb-render-util0-dev libxcb-shape0-dev libxcb-shm0-dev libxcb-sync-dev libxcb-util-dev libxcb-xfixes0-dev libxcb-xkb-dev libxcb1-dev libxext-dev libxfixes-dev libxi-dev libxkbcommon-dev libxkbcommon-x11-dev libxrender-dev
          git clone git://code.qt.io/qt/qt5.git qt6
          cd qt6
          git switch dev
          ./init-repository
          mkdir qt6-build
          cd qt6-build
          ../qt6/configure -prefix /usr/local/qt6
          cmake --build . --parallel 4
          cmake --install .

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Package Python venv
        run: |
          ./setup_python_linux.sh

      - name: Build TStar
        run: |
          ./src/build_linux.sh

      - name: Breakpoint if failed
        if: failure()
        uses: namespacelabs/breakpoint-action@v0
        with:
          duration: 30m
          authorized-users: Seggan

      - name: Create Debian Package
        run: |
          ./src/package_deb.sh

      - name: Upload Debian Package
        uses: actions/upload-artifact@v4
        with:
          name: tstar-deb-x86_64
          path: dist/*.deb
